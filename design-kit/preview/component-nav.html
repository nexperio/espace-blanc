<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; background: var(--paper); }
  body { padding: 0; font-family: var(--font-sans); }

  .top{
    display:flex; justify-content: space-between; align-items: center;
    padding: 10px 36px;
    font-family: var(--font-serif); font-style: italic; font-size: 13.5px;
    color: var(--ink-mute);
    border-bottom: 1px solid var(--ink);
  }
  .main{
    display:grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 24px;
    padding: 20px 36px;
  }
  .nav-left, .nav-right{ display:flex; gap: 22px; align-items: center; }
  .nav-right{ justify-content: flex-end }
  .nav-link{
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    color: var(--ink); text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .nav-link:hover{ border-bottom-color: var(--accent); color: var(--accent); }
  .nameplate{
    font-family: var(--font-serif); font-weight: 500;
    font-size: 28px; line-height: 1; letter-spacing: -0.01em;
    padding: 0 28px;
  }
  .nameplate em{ font-style: italic; color: var(--accent); font-weight: 500; }
  .cta{
    display:inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    background: var(--ink); color: var(--paper-2);
    border-radius: 999px;
    font-family: var(--font-sans); font-size: 12px; font-weight: 500;
    text-decoration: none;
  }
  .baseline-rule{
    height: 1px; background: var(--ink);
  }
</style>
</head>
<body>
  <div class="top">
    <span>Édition n° 23 · 26 mai 2026</span>
    <span>Île-de-France · Tirage privé</span>
    <span>+33 1 47 84 12 03</span>
  </div>
  <div class="main">
    <div class="nav-left">
      <a class="nav-link" href="#">Sommaire</a>
      <a class="nav-link" href="#">La méthode</a>
      <a class="nav-link" href="#">Témoignages</a>
    </div>
    <div class="nameplate">Espace <em>Blanc</em></div>
    <div class="nav-right">
      <a class="nav-link" href="#">Le concept</a>
      <a class="nav-link" href="#">Espace client</a>
      <a class="cta" href="#">Diagnostic gratuit</a>
    </div>
  </div>
  <div class="baseline-rule"></div>
</body>
</html>
